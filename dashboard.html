<!DOCTYPE html>
<html>
<head>
    <title>Metro Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin: 0; background-color: #f9f9f9; }
        .header { background-color: #8E24AA; color: white; padding: 15px 40px; display: flex; justify-content: space-between; align-items: center; }
        .logout-btn { background: white; color: #8E24AA; text-decoration: none; padding: 8px 15px; border-radius: 5px; font-weight: bold; }
        .dashboard-container { display: flex; justify-content: center; gap: 30px; margin-top: 40px; flex-wrap: wrap; }
        .card { background: white; padding: 30px; border-radius: 10px; box-shadow: 0px 4px 10px rgba(0,0,0,0.1); width: 300px; }
        .balance-text { font-size: 48px; color: #4CAF50; font-weight: bold; margin: 20px 0; }
        input[type="number"] { width: 100%; padding: 10px; margin-top: 10px; margin-bottom: 15px; border-radius: 5px; border: 1px solid #ccc; box-sizing: border-box;}
        .action-btn { background-color: #8E24AA; color: white; font-weight: bold; padding: 12px; border: none; border-radius: 5px; cursor: pointer; width: 100%; }
        #smartCardQR { display: flex; justify-content: center; margin: 20px 0; padding: 10px; background: #fff; border: 3px solid #8E24AA; border-radius: 10px; }
    </style>
</head>
<body>
    <div class="header">
        <h1 style="margin: 0; font-size:24px;">Welcome, {{ username }}</h1>
        <a href="/logout" class="logout-btn">Logout</a>
    </div>
    <div class="dashboard-container">
        
        <div class="card" style="border-top: 8px solid #8E24AA;">
            <h2 style="margin-top: 0; color: #333;">Digital Metro Card</h2>
            <p style="color: #666; font-size: 14px; margin-bottom: 0;">Scan at gate to travel</p>
            <div id="smartCardQR"></div>
            <div style="font-size: 12px; color: #888; font-family: monospace;">ID: {{ qr_data[:20] }}...</div>
        </div>

        <div class="card">
            <h2 style="margin-top: 0; color: #333;">Metro Wallet</h2>
            <div class="balance-text">₹{{ balance }}</div>
            <p style="color: #666; margin-bottom: 25px;">Available Balance</p>
            
            <form action="/topup" method="POST" style="text-align: left; padding-top: 15px; border-top: 1px solid #eee;">
                <label style="font-weight: bold; color: #8E24AA;">Add Funds</label>
                <input type="number" name="amount" min="10" max="5000" required placeholder="Amount in ₹">
                <button type="submit" class="action-btn">Recharge Wallet</button>
            </form>
        </div>
    </div>
    <script>
        new QRCode(document.getElementById("smartCardQR"), {
            text: "{{ qr_data }}", width: 180, height: 180, correctLevel : QRCode.CorrectLevel.L
        });
    </script>
</body>
</html>
