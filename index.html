<!DOCTYPE html>
<html>
<head>
    <title>Metro Ticket System</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 0;
            background-color: #f9f9f9;
        }
        .header {
            background-color: #8E24AA;
            color: white;
            padding: 20px 0;
        }
        .header h1 {
            margin: 0;
            font-size: 28px;
            text-transform: uppercase;
        }
        .content {
            margin-top: 50px;
        }
        .project-title {
            font-size: 24px;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }
        .team-info {
            font-size: 18px;
            color: #555;
            margin-bottom: 40px;
        }
        .btn-container {
            display: flex;
            justify-content: center;
            gap: 20px;
        }
        .action-btn {
            background-color: #8E24AA;
            color: white;
            font-size: 18px;
            font-weight: bold;
            text-decoration: none;
            padding: 15px 40px;
            border-radius: 5px;
            transition: 0.3s;
            border: 2px solid #8E24AA;
        }
        .action-btn:hover {
            background-color: white;
            color: #8E24AA;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Metro Ticket System</h1>
    </div>

    <div class="content">
        <div class="project-title">Class 12 Computer Science Project</div>
        <div class="team-info">By: S.S.Arihanth, S.M.S Muturaamanaathan, and S.Avinash</div>

        <div class="btn-container">
            <a href="/temptick" class="action-btn">Get Ticket</a>
            
            <a href="/login" class="action-btn">Login / Register</a>
        </div>
    </div>

</body>
</html>
