<!DOCTYPE html>
<html>
<head>
    <title>Ticket Issued</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 0;
            background-color: #f9f9f9;
        }
        .header {
            background-color: #8E24AA;
            color: white;
            padding: 15px 0;
        }
        .content {
            margin-top: 40px;
        }
        .success-text {
            color: #4CAF50; 
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 20px;
        }
        .ticket-box {
            background: white;
            border: 3px dashed #8E24AA;
            padding: 30px;
            display: inline-block;
            border-radius: 10px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
        }
        .journey-text {
            font-size: 20px;
            color: #333;
            margin-bottom: 10px;
        }
        .price-text {
            font-size: 24px;
            font-weight: bold;
            color: #8E24AA;
        }
        .qr-section {
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid #ddd;
        }
        /* We center the QR code inside its box */
        #qrcode {
            display: flex;
            justify-content: center;
            margin-top: 15px;
            margin-bottom: 15px;
        }
        .back-btn {
            display: inline-block;
            margin-top: 30px;
            background-color: #333;
            color: white;
            text-decoration: none;
            padding: 12px 25px;
            border-radius: 5px;
            font-weight: bold;
            transition: 0.2s;
        }
        .back-btn:hover {
            background-color: #555;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1 style="margin: 0; font-size: 24px;">Transaction Complete</h1>
    </div>

    <div class="content">
        <div class="success-text">Payment Successful!</div>
        
        <div class="ticket-box">
            <div class="journey-text">Journey: <strong>Station {{ start }}</strong> to <strong>Station {{ end }}</strong></div>
            <div class="price-text">Amount Paid: ₹{{ cost }}</div>
            
            <div class="qr-section">
                <p style="margin: 0; color: #666; font-size: 14px;"><strong>SCAN AT GATE (VALID FOR 24 HRS)</strong></p>
                
                <div id="qrcode"></div>
                
                <p style="font-family: monospace; font-size: 12px; color: #999; margin-top: 10px;">ID: {{ qr_data }}</p>
            </div>
        </div>
        
        <br>
        <a href="/" class="back-btn">Return to Home</a>
    </div>

    <script>
        // Grab the raw string injected by Flask
        const ticketString = "{{ qr_data }}";
        
        // Tell the library to draw a new QR code inside the 'qrcode' div
        new QRCode(document.getElementById("qrcode"), {
            text: ticketString,
            width: 200,   // You can change the size here
            height: 200,
            colorDark : "#000000",
            colorLight : "#ffffff",
            correctLevel : QRCode.CorrectLevel.H
        });
    </script>
</body>
</html>
